<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💥 ESCAPE ROOM: ENTEROS AL PODER · 8° BÁSICO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-light-pink: #F29191;
            --color-bright-red: #D93D3D;
            --color-dark-red: #BA2028;
            --color-purple: #7A378C;
            --color-deep-blue: #20308C;
            --color-white: #ffffff;
            --color-bg-soft: #fff5f5;
            --color-success: #2d7a2d;
            --color-error: #b91c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--color-deep-blue) 0%, var(--color-purple) 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            font-family: 'Comic Neue', sans-serif;
            color: #333;
        }

        .escape-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 3rem;
            border: 6px solid var(--color-dark-red);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 8px 8px 0px var(--color-light-pink);
            padding: 2rem;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-family: 'Bangers', cursive;
            font-size: 3.5rem;
            color: var(--color-bright-red);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0px var(--color-deep-blue);
            transform: skew(-2deg);
        }

        .sub {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            background: var(--color-deep-blue);
            color: white;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 50px;
            margin-top: 10px;
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            padding: 1rem 2rem;
            border-radius: 100px;
            border: 4px solid var(--color-deep-blue);
            margin-bottom: 2rem;
            gap: 1rem;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .sellos-label { font-family: 'Bangers', cursive; font-size: 1.4rem; color: var(--color-deep-blue); }
        .energy-bar { flex: 1; height: 24px; background: #ddd; border-radius: 12px; overflow: hidden; border: 2px solid var(--color-deep-blue); }
        .energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9a9a, var(--color-bright-red)); transition: width 0.5s ease; }

        .exercise-card {
            background: white;
            border: 3px solid var(--color-deep-blue);
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            box-shadow: 6px 6px 0px var(--color-light-pink);
        }

        .exercise-card.correct { border-color: var(--color-success); background-color: #f0fff4; }

        .problem-header { font-family: 'Bangers', cursive; font-size: 1.5rem; color: var(--color-dark-red); margin-bottom: 1rem; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }

        .interaction-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        select {
            font-family: 'Comic Neue', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.7rem;
            border: 3px solid var(--color-deep-blue);
            border-radius: 12px;
            flex: 1;
        }

        .btn-check {
            font-family: 'Bangers', cursive;
            background: var(--color-deep-blue);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
        }

        .btn-check:disabled { background: #ccc; box-shadow: none; }

        .feedback-box {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            border-left: 6px solid transparent;
        }
        .feedback-box.show { display: block; }
        .feedback-correct { background-color: #e6fffa; color: #234e52; border-left-color: var(--color-success); }
        .feedback-incorrect { background-color: #fff5f5; color: #742a2a; border-left-color: var(--color-error); }
        .feedback-title { font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }

        #victory-screen {
            display: none;
            text-align: center;
            padding: 3rem;
            background: var(--color-bg-soft);
            border: 8px dashed var(--color-bright-red);
            border-radius: 2rem;
        }
        #victory-screen h2 { font-family: 'Bangers', cursive; font-size: 4rem; color: var(--color-bright-red); }
    </style>
</head>
<body>

<div class="escape-container">
    <div class="header">
        <h1>💥 ENTEROS AL PODER 💥</h1>
        <div class="sub">✦ MISIÓN COMPLETA: 20 DESAFÍOS ✦</div>
    </div>

    <div class="status-panel">
        <div class="sellos-label">PODER: <span id="correct-count">0</span> / 20</div>
        <div class="energy-bar"><div class="energy-fill" id="progress-bar"></div></div>
    </div>

    <div id="quiz-container"></div>

    <div id="victory-screen">
        <h2>¡LEYENDA MATEMÁTICA!</h2>
        <p>🏆 Has completado los 20 desafíos. ¡Tu dominio de los enteros es absoluto! 🏆</p>
        <button class="btn-check" style="margin-top:20px" onclick="location.reload()">REINICIAR AVENTURA</button>
    </div>
</div>

<script>
    const questions = [
        // MULTIPLICACIÓN (1-5)
        { id: 1, text: "(−7) × 8", options: ["56", "-56", "1", "-1"], answer: "-56", 
          fbC: "¡Bien! (−) × (+) = (−).", fbI: "Recuerda: signos distintos dan negativo." },
        { id: 2, text: "(−4) × (−9)", options: ["36", "-36", "13", "-13"], answer: "36", 
          fbC: "¡Exacto! (−) × (−) = (+).", fbI: "Signos iguales dan positivo." },
        { id: 3, text: "12 × (−3)", options: ["36", "-36", "9", "-9"], answer: "-36", 
          fbC: "¡Correcto! (+) × (−) = (−).", fbI: "Positivo por negativo es negativo." },
        { id: 4, text: "(−5) × (−5)", options: ["25", "-25", "0", "-10"], answer: "25", 
          fbC: "¡Súper! El cuadrado de un negativo es positivo.", fbI: "Menos por menos es más." },
        { id: 5, text: "0 × (−15)", options: ["-15", "15", "0", "No existe"], answer: "0", 
          fbC: "¡Cierto! Todo número multiplicado por 0 es 0.", fbI: "El 0 es el elemento absorbente." },
        
        // DIVISIÓN (6-10)
        { id: 6, text: "(−42) ÷ 6", options: ["7", "-7", "-8", "8"], answer: "-7", 
          fbC: "¡Muy bien! (−) ÷ (+) = (−).", fbI: "La división sigue la misma ley de signos." },
        { id: 7, text: "(−100) ÷ (−4)", options: ["25", "-25", "400", "-400"], answer: "25", 
          fbC: "¡Excelente! Menos dividido por menos es más.", fbI: "Signos iguales = resultado positivo." },
        { id: 8, text: "50 ÷ (−2)", options: ["25", "-25", "48", "-48"], answer: "-25", 
          fbC: "¡Bien! (+) ÷ (−) = (−).", fbI: "Más entre menos es menos." },
        { id: 9, text: "(−81) ÷ (−9)", options: ["9", "-9", "0", "81"], answer: "9", 
          fbC: "¡Correcto! 9 positivo.", fbI: "9 por 9 es 81, y menos entre menos es más." },
        { id: 10, text: "0 ÷ (−5)", options: ["0", "-5", "5", "Error"], answer: "0", 
          fbC: "¡Exacto! 0 dividido por cualquier número es 0.", fbI: "El cero arriba siempre da cero." },

        // MIXTOS Y LEYES (11-15)
        { id: 11, text: "(−2) × (−3) × (−4)", options: ["24", "-24", "9", "-9"], answer: "-24", 
          fbC: "¡Logrado! Tres negativos dan negativo.", fbI: "Cuenta los signos: (−)×(−)=(+) y (+)×(−)=(−)." },
        { id: 12, text: "(−10) × 2 ÷ (−4)", options: ["5", "-5", "20", "-20"], answer: "5", 
          fbC: "¡Bien! −20 ÷ −4 = 5.", fbI: "Hazlo paso a paso: primero multiplica, luego divide." },
        { id: 13, text: "¿Qué signo tiene el resultado de 15 números negativos multiplicados?", options: ["Positivo", "Negativo"], answer: "Negativo", 
          fbC: "¡Cierto! Cantidad impar de negativos = negativo.", fbI: "Si la cantidad de negativos es impar, el resultado es negativo." },
        { id: 14, text: "(−1) × (−1) × (−1) × (−1)", options: ["1", "-1", "4", "-4"], answer: "1", 
          fbC: "¡Correcto! Cantidad par de negativos = positivo.", fbI: "Son 4 signos menos, eso da positivo." },
        { id: 15, text: "−12 ÷ (2 × 3)", options: ["2", "-2", "6", "-6"], answer: "-2", 
          fbC: "¡Perfecto! Resolvemos el paréntesis primero.", fbI: "Paréntesis: 2×3=6. Luego −12÷6." },

        // DESAFÍOS FINALES (16-20)
        { id: 16, text: "¿Cuál es el valor de x en: x ÷ (−3) = 10?", options: ["30", "-30", "7", "-7"], answer: "-30", 
          fbC: "¡Increíble! −30 ÷ −3 = 10.", fbI: "Piensa: ¿Qué número dividido por −3 da 10 positivo?" },
        { id: 17, text: "(−5) × 4 ÷ (−2) × (−3)", options: ["30", "-30", "10", "-10"], answer: "-30", 
          fbC: "¡Qué nivel! −20 ÷ −2 = 10, y 10 × −3 = −30.", fbI: "Operaciones de izquierda a derecha." },
        { id: 18, text: "Si a = −2 y b = −3, calcula a × b × a", options: ["12", "-12", "6", "-6"], answer: "-12", 
          fbC: "¡Súper! (−2) × (−3) × (−2) = −12.", fbI: "Sustituye: −2 por −3 es 6, luego 6 por −2." },
        { id: 19, text: "El inverso aditivo de (−4 × 2) es:", options: ["8", "-8", "4", "-4"], answer: "8", 
          fbC: "¡Bien! −8 tiene como inverso al 8.", fbI: "Primero calcula −4×2 = −8. Su opuesto es 8." },
        { id: 20, text: "(−100 ÷ 10) × (−10 ÷ 1)", options: ["100", "-100", "1", "-1"], answer: "100", 
          fbC: "¡MAESTRO! (−10) × (−10) = 100.", fbI: "Paréntesis 1: −10. Paréntesis 2: −10. Multiplicados dan 100." }
    ];

    let score = 0;

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = questions.map((q, index) => `
            <div class="exercise-card" id="card-${index}">
                <div class="problem-header">DESAFÍO #${q.id}</div>
                <div class="problem-body">
                    <p class="question-text">${q.text}</p>
                    <div class="interaction-row">
                        <select id="select-${index}">
                            <option value="" disabled selected>Respuesta...</option>
                            ${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                        </select>
                        <button class="btn-check" id="btn-${index}" onclick="verifyAnswer(${index})">VALIDAR</button>
                    </div>
                    <div id="feedback-${index}" class="feedback-box"></div>
                </div>
            </div>
        `).join('');
    }

    window.verifyAnswer = function(index) {
        const select = document.getElementById(`select-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        const fb = document.getElementById(`feedback-${index}`);
        const card = document.getElementById(`card-${index}`);
        const userAnswer = select.value;
        const q = questions[index];

        if (!userAnswer) return;

        fb.classList.remove('feedback-correct', 'feedback-incorrect', 'show');

        if (userAnswer === q.answer) {
            score++;
            fb.innerHTML = `<span class="feedback-title">¡CORRECTO!</span>${q.fbC}`;
            fb.classList.add('feedback-correct', 'show');
            card.classList.add('correct');
            select.disabled = true;
            btn.disabled = true;
            btn.innerText = "✓";
            updateProgress();
        } else {
            fb.innerHTML = `<span class="feedback-title">INTENTA OTRA VEZ</span>${q.fbI}`;
            fb.classList.add('feedback-incorrect', 'show');
        }
    }

    function updateProgress() {
        const total = questions.length;
        const percent = (score / total) * 100;
        document.getElementById('correct-count').innerText = score;
        document.getElementById('progress-bar').style.width = percent + "%";

        if (score === total) {
            setTimeout(() => {
                document.getElementById('quiz-container').style.display = 'none';
                document.getElementById('victory-screen').style.display = 'block';
                window.scrollTo(0,0);
            }, 800);
        }
    }

    renderQuiz();
</script>
</body>
</html>
